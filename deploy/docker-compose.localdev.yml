# =============================================================================
# Sub2API — 本地开发数据库（postgres + redis 仅）
# 用于 go run ./cmd/server/... 本地开发时提供基础设施
#
# 使用方法：
#   cd D:\codeup\sub2api\deploy
#   docker compose -f docker-compose.localdev.yml up -d
# =============================================================================

services:
  postgres:
    image: postgres:18-alpine
    container_name: sub2api-postgres-local
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - ./localdev_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=sub2api
      - POSTGRES_PASSWORD=sub2api_dev
      - POSTGRES_DB=sub2api
      - PGDATA=/var/lib/postgresql/data
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub2api -d sub2api"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:8-alpine
    container_name: sub2api-redis-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./localdev_redis_data:/data
    command: redis-server --save 60 1 --appendonly yes
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
